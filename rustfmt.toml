# rustfmt 配置文件
# 注意：某些配置选项需要 nightly 版本，这里只使用稳定版本支持的选项
edition = "2021"
max_width = 100
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
hard_tabs = false
chain_width = 80
# 以下选项需要 nightly 版本，已注释
# wrap_comments = true
# format_code_in_doc_comments = true
# format_strings = true
# format_macro_matchers = true
# format_macro_bodies = true
# format_macro_definitions = false

